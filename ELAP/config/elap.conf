# ─────────────────────────────────────────────────────────────
# Default configuration file
# ─────────────────────────────────────────────────────────────
# ELAP Platform Configuration
# Copy to /etc/elap/elap.conf and customize

# ── Monitoring thresholds ─────────────────────────────────────
ELAP_CPU_WARN_RATIO=1.0       # load/cores ratio for warning
ELAP_CPU_CRIT_RATIO=2.0       # load/cores ratio for critical
ELAP_MEM_WARN_PCT=20          # available memory warning %
ELAP_MEM_CRIT_PCT=10          # available memory critical %
ELAP_DISK_WARN_PCT=80         # disk usage warning %
ELAP_DISK_CRIT_PCT=90         # disk usage critical %
ELAP_MONITOR_INTERVAL=60      # health check interval (seconds)

# ── Backup configuration ─────────────────────────────────────
ELAP_BACKUP_ROOT=/backup
ELAP_BACKUP_RETENTION_DAYS=30
ELAP_BACKUP_DIRS=("/etc" "/opt/enterprise-linux-platform")

# ── Notification ─────────────────────────────────────────────
ELAP_WEBHOOK=""               # Slack/Teams webhook URL
ELAP_NOTIFY_EMAIL=""          # email for reports

# ── LVM configuration ─────────────────────────────────────────
ELAP_LVM_EXPAND_THRESHOLD=80  # % to trigger auto-expansion
ELAP_LVM_EXPAND_BY_GB=20      # GB to add when expanding

# ── Debug ────────────────────────────────────────────────────
ELAP_DEBUG=false
ELAP_DRY_RUN=false
